<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Miro Live Embed</title>
    <style>
      * { box-sizing: border-box; }
      html, body, #board { width: 100%; height: 100%; margin: 0; overflow: hidden; }
      body {
        min-height: 560px;
        background: #f3f4f7;
        font: 14px/1.4 Inter, ui-sans-serif, system-ui, sans-serif;
      }
      #board {
        display: block;
        border: 0;
        background: #fff;
      }
      #status {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        color: #656b7a;
        text-align: center;
        background: #f3f4f7;
        z-index: 1;
      }
      #status.hidden { display: none; }
      #status.error { color: #b42318; }
    </style>
  </head>
  <body>
    <div id="status">Loading Miro board…</div>
    <iframe
      id="board"
      title="Miro board"
      allow="fullscreen; clipboard-read; clipboard-write; storage-access"
      allowfullscreen
      referrerpolicy="no-referrer-when-downgrade"
    ></iframe>
    <script>
      const miroFrame = document.getElementById("board");
      const miroStatus = document.getElementById("status");
      miroFrame.addEventListener("load", () => miroStatus.classList.add("hidden"));
      miroFrame.addEventListener("error", () => {
        miroStatus.className = "error";
        miroStatus.textContent = "Miro Live Embed could not be loaded.";
      });
    </script>
    <script type="module">
      import {
        App,
        PostMessageTransport,
      } from "https://esm.sh/@modelcontextprotocol/ext-apps@1.5.0";

      const frame = document.getElementById("board");
      const status = document.getElementById("status");
      let currentUrl = frame.getAttribute("src") || "";

      function showBoard(data) {
        if (!data?.embedUrl || data.embedUrl === currentUrl) return;
        try {
          const url = new URL(data.embedUrl);
          if (
            url.protocol !== "https:" ||
            (url.hostname !== "miro.com" && !url.hostname.endsWith(".miro.com"))
          ) {
            throw new Error("Unexpected Miro embed origin.");
          }
          currentUrl = url.toString();
          status.className = "";
          status.textContent = "Loading Miro board…";
          frame.src = currentUrl;
        } catch (error) {
          status.className = "error";
          status.textContent =
            error instanceof Error ? error.message : "Unable to load Miro board.";
        }
      }

      const app = new App(
        { name: "miro-live-embed", version: "0.2.0" },
        {},
        { autoResize: true, strict: true },
      );
      app.ontoolresult = (result) => showBoard(result.structuredContent);
      await app.connect(new PostMessageTransport(window.parent, window.parent));
      showBoard(window.MIRO_DATA);
    </script>
  </body>
</html>
